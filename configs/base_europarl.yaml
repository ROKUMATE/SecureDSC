# Paper-faithful config: real Europarl English corpus, AWGN channel.
# Prepare the corpus first:  python -m scripts.get_europarl
# (writes data/europarl-v7.en). Then train as usual. GPU strongly recommended.
data:
  source: europarl
  path: data/europarl-v7.en
  max_len: 30
  min_len: 4
  max_vocab: 10000
  max_sentences: 100000     # subsample for tractable training; raise for full
  val_fraction: 0.05

model:
  d_model: 128
  nhead: 8
  dim_feedforward: 512
  num_sem_layers: 3
  num_cipher_layers: 2
  channel_dim: 16
  dropout: 0.1
  key_len: 64
  n_key_tokens: 4

channel:
  kind: awgn               # awgn | rayleigh
  train_snr_db: 12.0
  csi_rho: 0.95
  csi_dim: 32
  csi_snr_db: 15.0

keygen:
  kind: random             # random | csi
  csi_hidden: 128
  recon_repeat: 3
  bits: 64

lam:
  kind: fixed              # fixed | adaptive
  # ln(10000) ~= 9.2; target ~0.9*ln(vocab) so Eve stays near random-guessing.
  # This corpus-dependence is exactly why the adaptive scheduler helps.
  value: 8.0
  target_frac: 0.9
  eta: 0.05
  ema: 0.9

train:
  epochs: 40
  batch_size: 128
  lr_joint: 0.0001
  lr_sub: 0.001
  lr_eve: 0.001
  grad_clip: 1.0
  log_every: 100
  device: auto
  seed: 0
  out_dir: results
  run_name: base_europarl

eval:
  snr_db_list: [0, 3, 6, 9, 12, 15, 18]
  rho_list: [0.5, 0.7, 0.9, 0.95, 0.99]
  num_batches: 16
  bleu_ngrams: 4
