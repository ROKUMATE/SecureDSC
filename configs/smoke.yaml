# Tiny CPU smoke test: runs the whole pipeline in seconds. Not meant to reach
# good BLEU -- just to prove every module wires together.
data:
  source: toy
  max_len: 12
  max_vocab: 200
  val_fraction: 0.2

model:
  d_model: 32
  nhead: 4
  dim_feedforward: 64
  num_sem_layers: 1
  num_cipher_layers: 1
  channel_dim: 8
  dropout: 0.1
  key_len: 16
  n_key_tokens: 2

channel:
  kind: awgn
  train_snr_db: 12.0
  csi_rho: 0.95
  csi_dim: 16
  csi_snr_db: 15.0

keygen:
  kind: random       # random | csi
  csi_hidden: 32
  recon_repeat: 3

lam:
  kind: fixed        # fixed | adaptive
  value: 4.0         # ~0.9*ln(vocab) for the tiny toy vocab
  target_frac: 0.9
  eta: 0.05

train:
  epochs: 2
  batch_size: 16
  lr_joint: 0.0003
  lr_sub: 0.001
  lr_eve: 0.001
  log_every: 20
  device: cpu
  seed: 0
  out_dir: results
  run_name: smoke

eval:
  snr_db_list: [0, 6, 12, 18]
  rho_list: [0.5, 0.7, 0.9, 0.99]
  num_batches: 4
  bleu_ngrams: 4
